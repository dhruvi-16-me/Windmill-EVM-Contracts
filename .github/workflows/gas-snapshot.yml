name: Gas Snapshot

on:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "script/**"
      - "foundry.toml"
      - ".gas-snapshot"
      - ".github/workflows/gas-snapshot.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "test/**"
      - "script/**"
      - "foundry.toml"
      - ".gas-snapshot"
      - ".github/workflows/gas-snapshot.yml"
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gas:
    name: Gas Baseline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: "1.5.1"

      - name: Install dependencies
        run: |
          if [ -d lib/forge-std ]; then
           echo "forge-std already present, skipping install"
          else
           forge install foundry-rs/forge-std
          fi
      - name: Check or generate gas snapshot
        run: |
          if [ -f .gas-snapshot ]; then
            forge snapshot --check
          else
            # Template bootstrap: generate a first baseline if one is not committed yet.
            forge snapshot
          fi

      - name: Upload gas snapshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gas-snapshot
          path: .gas-snapshot
          if-no-files-found: ignore
